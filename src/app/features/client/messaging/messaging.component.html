<app-page-header title="Support & Messagerie" subtitle="Contactez notre équipe directement"></app-page-header>

<div class="client-chat fade-in-up">

  <!-- Skeleton loading -->
  <div class="messages-wrap" *ngIf="loading">
    <div class="chat-skeleton">
      <div class="skel-msg skel-msg--recv"></div>
      <div class="skel-msg skel-msg--sent"></div>
      <div class="skel-msg skel-msg--recv skel-msg--short"></div>
    </div>
  </div>

  <!-- Messages area -->
  <div class="messages-wrap" #messagesWrap *ngIf="!loading">
    <div class="messages-inner">

      <!-- Welcome banner (no messages yet) -->
      <div class="chat-welcome" *ngIf="messages.length === 0">
        <div class="chat-welcome__icon">🛎️</div>
        <h4>Support Charge Pay</h4>
        <p>Notre équipe est là pour vous aider. Décrivez votre problème ou posez votre question !</p>
      </div>

      <div class="date-sep"><span>Aujourd'hui</span></div>

      <div *ngFor="let msg of messages"
           class="msg-row"
           [class.msg-row--sent]="isSentByMe(msg)"
           [class.msg-row--received]="!isSentByMe(msg)">

        <div class="msg-avatar" *ngIf="!isSentByMe(msg)">
          <span nz-icon nzType="customer-service" nzTheme="outline"></span>
        </div>

        <div class="msg-bubble">
          <p class="msg-bubble__text">{{ msg.content }}</p>
          <span class="msg-bubble__time">{{ msg.createdAt | dateFormat }}</span>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="msg-row msg-row--received" *ngIf="isTyping">
        <div class="msg-avatar">
          <span nz-icon nzType="customer-service" nzTheme="outline"></span>
        </div>
        <div class="msg-bubble msg-bubble--typing">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea class="chat-input"
             [(ngModel)]="newMessage"
             placeholder="Décrivez votre problème..."
             rows="1"
             (keydown)="onKeydown($event)">
      </textarea>
    </div>
    <button class="send-btn" (click)="sendMessage()" [disabled]="!newMessage.trim() || sending">
      <span nz-icon [nzType]="sending ? 'loading' : 'send'" nzTheme="outline"></span>
    </button>
  </div>

</div>
