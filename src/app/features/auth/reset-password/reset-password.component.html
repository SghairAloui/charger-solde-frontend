<div class="reset-wrapper">
  <div class="reset-card">

    <!-- Form -->
    <div *ngIf="!success">
      <div class="reset-card__icon">
        <span nz-icon nzType="lock" nzTheme="outline"></span>
      </div>
      <h2 class="reset-card__title">Nouveau mot de passe</h2>
      <p class="reset-card__sub">Saisissez le code reçu par email et votre nouveau mot de passe</p>

      <div class="reset-form">
        <div class="form-field">
          <label class="form-label">Email</label>
          <nz-input-group [nzPrefix]="prefixMail">
            <input nz-input [(ngModel)]="emailVal" type="email" placeholder="votre@email.com" />
          </nz-input-group>
        </div>

        <div class="form-field">
          <label class="form-label">Code de vérification</label>
          <nz-input-group [nzPrefix]="prefixCode">
            <input nz-input [(ngModel)]="codeVal" placeholder="123456" maxlength="6" class="code-input" />
          </nz-input-group>
        </div>

        <div class="form-field">
          <label class="form-label">Nouveau mot de passe</label>
          <nz-input-group [nzPrefix]="prefixPwd" [nzSuffix]="suffixNewPwd">
            <input nz-input [(ngModel)]="newPwdVal" [type]="showNewPwd ? 'text' : 'password'" placeholder="••••••••" />
          </nz-input-group>
        </div>

        <div class="form-field">
          <label class="form-label">Confirmer le mot de passe</label>
          <nz-input-group [nzPrefix]="prefixPwd" [nzSuffix]="suffixConfirmPwd">
            <input nz-input [(ngModel)]="confirmPwdVal" [type]="showConfirmPwd ? 'text' : 'password'" placeholder="••••••••" />
          </nz-input-group>
        </div>

        <br>

        <button
          nz-button
          nzType="primary"
          nzBlock
          nzSize="large"
          [nzLoading]="loading"
          type="button"
          class="reset-form__btn"
          (click)="onSubmit()"
        >
          <span *ngIf="!loading">Réinitialiser</span>
        </button>

        <a routerLink="/auth/login" class="reset-form__back">
          <span nz-icon nzType="arrow-left" nzTheme="outline"></span>
          Retour à la connexion
        </a>
      </div>
    </div>

    <!-- Success -->
    <div *ngIf="success" class="reset-success">
      <nz-result
        nzStatus="success"
        nzTitle="Mot de passe réinitialisé"
        nzSubTitle="Votre mot de passe a été modifié avec succès. Redirection vers la connexion..."
      >
        <div nz-result-extra>
          <button nz-button nzType="primary" nzSize="large" (click)="goToLogin()">Se connecter</button>
        </div>
      </nz-result>
    </div>

  </div>
</div>

<ng-template #prefixMail><span nz-icon nzType="mail" nzTheme="outline" class="input-icon"></span></ng-template>
<ng-template #prefixCode><span nz-icon nzType="key" nzTheme="outline" class="input-icon"></span></ng-template>
<ng-template #prefixPwd><span nz-icon nzType="lock" nzTheme="outline" class="input-icon"></span></ng-template>

<ng-template #suffixNewPwd>
  <span nz-icon [nzType]="showNewPwd ? 'eye-invisible' : 'eye'" (click)="showNewPwd = !showNewPwd" class="pwd-toggle"></span>
</ng-template>
<ng-template #suffixConfirmPwd>
  <span nz-icon [nzType]="showConfirmPwd ? 'eye-invisible' : 'eye'" (click)="showConfirmPwd = !showConfirmPwd" class="pwd-toggle"></span>
</ng-template>
