<div class="forgot-wrapper">
  <div class="forgot-card">
    <ng-container *ngIf="!emailSent; else success">
      <div class="forgot-card__icon">
        <span nz-icon nzType="lock" nzTheme="outline"></span>
      </div>
      <h2 class="forgot-card__title">Mot de passe oublié</h2>
      <p class="forgot-card__sub">Saisissez votre adresse email pour recevoir un lien de réinitialisation</p>

      <form nz-form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
        <nz-form-item>
          <nz-form-label nzRequired>Email</nz-form-label>
          <nz-form-control nzErrorTip="Veuillez saisir un email valide">
            <nz-input-group [nzPrefix]="prefixMail">
              <input nz-input formControlName="email" type="email" placeholder="exemple@email.com" />
            </nz-input-group>
          </nz-form-control>
        </nz-form-item>
          <br>
        <button nz-button nzType="primary" nzBlock nzSize="large" [nzLoading]="loading" class="forgot-form__btn" type="submit">
          <span *ngIf="!loading">Envoyer le lien</span>
        </button>

        <a routerLink="/auth/login" class="forgot-form__back">
          <span nz-icon nzType="arrow-left" nzTheme="outline"></span>
          Retour à la connexion
        </a>
      </form>
    </ng-container>

    <ng-template #success>
      <div class="forgot-success">
        <nz-result
          nzStatus="success"
          nzTitle="Email envoyé"
          nzSubTitle="Un code de vérification à 6 chiffres a été envoyé à votre adresse email. Veuillez vérifier votre boîte de réception et utiliser ce code pour réinitialiser votre mot de passe."
        >
          <div nz-result-extra>
            <button nz-button nzType="primary" nzSize="large" routerLink="/auth/login">Retour à la connexion</button>
          </div>
        </nz-result>
      </div>
    </ng-template>
  </div>
</div>

<ng-template #prefixMail><span nz-icon nzType="mail" nzTheme="outline" class="input-icon"></span></ng-template>
